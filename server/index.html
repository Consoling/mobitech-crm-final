<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .main{
            display: flex;
            
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            outline: none;
            border:none;
            background-color: #007BFF;
            color: white;
                border-radius: 5px;
                transition: all 0.3s ease;
        }

        button:hover {
            background-color: #0056b3;
            transform: scale(1.02);
        }

        input[type="file"] {
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        input[type="file"]::file-selector-button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            outline: none;
            border:none;
            background-color: #28a745;
            color: white;
                border-radius: 5px;
                transition: all 0.3s ease;
        }
    </style>
    <title>Document</title>
</head>
<body>
    <div class="main">
        <form action="http://localhost:3567/api/v2/ocr/ocr-extract" method="post" enctype="multipart/form-data"
    class=""
    
    >

        <input type="file" name="images" id="ocr-image" accept="image/*" required multiple>

        <button type="submit">Extract Text</button>
    </form>
    </div>
</body>
</html>
